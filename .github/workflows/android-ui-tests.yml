# Run Android Espresso UI tests on an emulator (Country challenge + normal game flows).
# Triggers on changes under mobile/. The third normal-game test requires backend/WebSocket
# to reach Lobby and GamePlay; it may fail in CI if no backend is configured.
#
# Note: Emulator startup on GitHub-hosted runners can be flaky (device not found).
# Run locally: use Node 22 (e.g. `cd mobile && nvm use`), then
#   cd mobile/android && ./gradlew connectedDebugAndroidTest

name: Android UI tests

on:
  push:
    branches: [ '**' ]

jobs:
  android-ui-tests:
    # macos-14 (macos-13 is deprecated/unsupported). If emulator is flaky, try ubuntu-latest.
    runs-on: macos-14
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: cd mobile && npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Espresso tests
        uses: ReactiveCircus/android-emulator-runner@v2
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 300
        with:
          api-level: 30
          target: default
          arch: x86_64
          script: |
            # Wait for emulator to be visible and booted (flaky on GH runners)
            echo "Waiting for emulator..."
            for i in $(seq 1 60); do
              if adb devices | grep -q emulator && adb shell getprop sys.boot_completed 2>/dev/null | grep -q 1; then
                echo "Emulator ready after ${i}s"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "Emulator did not become ready in time"
                adb devices -l
                exit 1
              fi
              sleep 5
            done
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            cd mobile/android && ./gradlew connectedDebugAndroidTest --no-daemon
