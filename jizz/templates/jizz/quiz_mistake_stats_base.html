<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Quiz mistake statistics{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 1.5rem; max-width: 1200px; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 2rem; }
        th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: left; }
        th { background: #f5f5f5; }
        .num { text-align: right; }
        .muted { color: #666; font-size: 0.9rem; }
        h1 { font-size: 1.4rem; }
        h2 { font-size: 1.1rem; margin-top: 1.5rem; }
        nav.tabs { margin-bottom: 1rem; }
        nav.tabs a { margin-right: 0.75rem; }
        a.tab-active { font-weight: bold; text-decoration: none; color: inherit; cursor: default; }
        a.sort-active { font-weight: bold; }
    </style>
</head>
<body>
    <nav class="tabs">
        <a href="/admin/">Admin</a>
        <span> · </span>
        {% if active_tab == 'species' %}
        <span class="tab-active">Species</span>
        {% else %}
        <a href="{% url 'quiz-mistake-species' %}{% if selected_country %}?country={{ selected_country }}{% endif %}">Species</a>
        {% endif %}
        <span> · </span>
        {% if active_tab == 'pairs' %}
        <span class="tab-active">Confused pairs</span>
        {% else %}
        <a href="{% url 'quiz-mistake-pairs' %}{% if selected_country %}?country={{ selected_country }}{% endif %}">Confused pairs</a>
        {% endif %}
        {% block nav_extra %}{% endblock %}
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
