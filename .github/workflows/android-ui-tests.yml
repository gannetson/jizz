# Run Android Espresso UI tests on an emulator (Country challenge + normal game flows).
# Triggers on changes under mobile/. The third normal-game test requires backend/WebSocket
# to reach Lobby and GamePlay; it may fail in CI if no backend is configured.

name: Android UI tests

on:
  push:
    branches: ['main', 'master']
    paths: ['mobile/**']
  pull_request:
    branches: ['main', 'master']
    paths: ['mobile/**']
  workflow_dispatch:

jobs:
  android-ui-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: cd mobile && npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Espresso tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          script: cd mobile/android && ./gradlew connectedDebugAndroidTest --no-daemon
