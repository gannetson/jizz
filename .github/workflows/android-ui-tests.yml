# Run Android Espresso UI tests on an emulator (Country challenge + normal game flows).
# Triggers on changes under mobile/. The third normal-game test requires backend/WebSocket
# to reach Lobby and GamePlay; it may fail in CI if no backend is configured.

name: Android UI tests

on:
  push:
    branches: [ '**' ]

jobs:
  android-ui-tests:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: cd mobile && npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Espresso tests
        uses: ReactiveCircus/android-emulator-runner@v2
        env:
          # Give emulator more time to boot and become visible to adb
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 300
        with:
          api-level: 30
          target: default
          arch: x86_64
          script: |
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            cd mobile/android && ./gradlew connectedDebugAndroidTest --no-daemon
