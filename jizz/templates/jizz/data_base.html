<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Birdr data{% endblock %}</title>
    <style>
        :root {
            --birdr-50: #f5ede0;
            --birdr-100: #e8d4b8;
            --birdr-200: #d4b88a;
            --birdr-500: #8b6419;
            --birdr-600: #6d4e14;
            --birdr-800: #31220a;
            --success-500: #1a6b1a;
            --warning-500: #cc6600;
            --error-500: #990000;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--birdr-800);
            background: var(--birdr-50);
            line-height: 1.5;
        }

        a { color: var(--birdr-600); }
        a:hover { color: var(--birdr-500); }

        .site-header {
            background: linear-gradient(135deg, var(--birdr-800) 0%, var(--birdr-600) 100%);
            color: var(--birdr-50);
            padding: 1.25rem 1.5rem 1rem;
            box-shadow: 0 2px 8px rgba(49, 34, 10, 0.2);
        }

        .site-header a { color: var(--birdr-100); text-decoration: none; }
        .site-header a:hover { color: #fff; }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .brand-mark {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: var(--birdr-200);
            color: var(--birdr-800);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.02em;
        }

        .brand-subtitle {
            margin: 0;
            font-size: 0.9rem;
            color: var(--birdr-200);
        }

        nav.main-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            font-size: 0.95rem;
        }

        nav.main-nav a {
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
        }

        nav.main-nav a.nav-active {
            background: var(--birdr-200);
            color: var(--birdr-800);
            font-weight: 600;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .page-card {
            background: #fff;
            border: 1px solid var(--birdr-100);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 1px 3px rgba(49, 34, 10, 0.06);
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 0.5rem;
        }

        h2 {
            font-size: 1.1rem;
            margin: 1.5rem 0 0.75rem;
        }

        .muted {
            color: #6d5c48;
            font-size: 0.92rem;
        }

        nav.tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0 1.25rem;
        }

        nav.tabs a, nav.tabs span.tab-active {
            padding: 0.4rem 0.85rem;
            border-radius: 8px;
            text-decoration: none;
            border: 1px solid var(--birdr-100);
            background: var(--birdr-50);
            color: var(--birdr-800);
            font-size: 0.9rem;
        }

        nav.tabs a:hover {
            background: var(--birdr-100);
        }

        nav.tabs span.tab-active {
            background: var(--birdr-500);
            border-color: var(--birdr-500);
            color: #fff;
            font-weight: 600;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem 1rem;
            margin-bottom: 1rem;
        }

        label { font-weight: 600; font-size: 0.9rem; }

        select {
            padding: 0.45rem 0.65rem;
            border: 1px solid var(--birdr-200);
            border-radius: 8px;
            background: #fff;
            color: var(--birdr-800);
            min-width: 14rem;
        }

        table.data-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.92rem;
        }

        table.data-table th,
        table.data-table td {
            border-bottom: 1px solid var(--birdr-100);
            padding: 0.55rem 0.65rem;
            text-align: left;
            vertical-align: top;
        }

        table.data-table th {
            background: var(--birdr-50);
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        th.sortable a {
            color: inherit;
            text-decoration: none;
            display: block;
        }

        th.sortable a:hover {
            color: var(--birdr-600);
        }

        th.sort-active {
            background: var(--birdr-100);
        }

        table.data-table tbody tr:hover {
            background: #faf6f0;
        }

        .num { text-align: right; white-space: nowrap; }

        .badge {
            display: inline-block;
            padding: 0.1rem 0.45rem;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-native { background: #d4e8d4; color: var(--success-500); }
        .badge-rare { background: #fff4e6; color: var(--warning-500); }
        .badge-endemic { background: #ffe5e5; color: var(--error-500); }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .link-card {
            display: block;
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--birdr-100);
            background: var(--birdr-50);
            text-decoration: none;
            color: inherit;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(49, 34, 10, 0.1);
            border-color: var(--birdr-200);
        }

        .link-card h2 {
            margin: 0 0 0.35rem;
            color: var(--birdr-800);
            font-size: 1.05rem;
        }

        .link-card p {
            margin: 0;
            color: #6d5c48;
            font-size: 0.9rem;
        }

        .latin { color: #8a7358; font-style: italic; font-size: 0.88rem; }

        a.sort-active { font-weight: 700; color: var(--birdr-800); }

        @media (max-width: 640px) {
            .container { padding: 1rem; }
            .page-card { padding: 1rem; }
            table.data-table { font-size: 0.85rem; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <div class="brand-mark">B</div>
            <div>
                <p class="brand-title"><a href="{% url 'data-index' %}">Birdr</a></p>
                <p class="brand-subtitle">Open data &amp; insights</p>
            </div>
        </div>
        <nav class="main-nav">
            <a href="{% url 'data-index' %}" {% if active_section == 'home' %}class="nav-active"{% endif %}>Overview</a>
            <a href="{% url 'data-quiz-mistake-species' %}" {% if active_section == 'quiz-mistakes' %}class="nav-active"{% endif %}>Quiz mistakes</a>
            <a href="{% url 'data-games-played' %}" {% if active_section == 'games-played' %}class="nav-active"{% endif %}>Games played</a>
            <a href="{% url 'data-taxon-orders' %}" {% if active_section == 'taxons' %}class="nav-active"{% endif %}>Taxonomy</a>
            {% if user.is_staff %}
            <a href="{% url 'staff-usage' %}" {% if active_section == 'usage' %}class="nav-active"{% endif %}>Usage metrics</a>
            {% endif %}
            <a href="/">Back to app</a>
        </nav>
    </header>

    <main class="container">
        <div class="page-card">
            {% block content %}{% endblock %}
        </div>
    </main>
    {% block extra_body %}{% endblock %}
</body>
</html>
