pluginManagement {
    includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().toString())
}
plugins { id("com.facebook.react.settings") }

// Android build requires Node 18+ (React Native CLI and Expo autolinking use modern JS).
// Run from terminal: nvm use 22 && npx expo run:android   OR   ./scripts/run-android.sh
def nodeVersionOut = ["node", "--version"].execute((String[])null, rootDir).text.trim()
def nodeMajorMatcher = (nodeVersionOut =~ /v?(\d+)/)
def nodeMajor = nodeMajorMatcher.find() ? nodeMajorMatcher.group(1).toInteger() : 0
if (nodeMajor > 0 && nodeMajor < 18) {
  throw new GradleException("Android build requires Node 18+. Current: " + nodeVersionOut + ".\n\nRun: ./scripts/run-android.sh   or   nvm use 22 && npx expo run:android")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'Birdr'

dependencyResolutionManagement {
  versionCatalogs {
    reactAndroidLibs {
      from(files(file("gradle/libs.versions.toml")))
    }
  }
}

apply from: new File(["node", "--print", "require.resolve('expo/package.json')"].execute(null, rootDir).text.trim(), "../scripts/autolinking.gradle");
useExpoModules()

include ':app'
includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile())
